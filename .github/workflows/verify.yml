name: Verify

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build backend
        run: npm run build:be

      - name: Test backend
        run: npm run test:be

      - name: Lint frontend
        run: npm run lint:fe

      - name: Build frontend
        run: npm run build:fe
